<section class="scroll-mt-24 px-4 sm:px-6 lg:px-8 py-16">
  <div class="mx-auto w-full max-w-[1200px]">
    <h2 class="text-center text-4xl pt-8 sm:text-5xl font-extrabold text-pink-500">Projets pros et persos</h2>
    <div class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">
      @for (project of projects; track project.id) {
      <article class="glass p-6 sm:p-8 flex flex-col transition hover:bg-transparent hover:border-pink-300">
        <h3 class="text-xl sm:text-2xl font-extrabold text-amber-300">{{ project.title }}</h3>
        <p class="mt-3 text-white/90 leading-relaxed">{{ project.description }}</p>

        <div class="mt-5 flex flex-wrap gap-2">
          @for (tag of project.tags; track tag) {
          <span class="px-3 py-1 rounded-full border border-yellow-200 bg-white/5 text-orange-200 text-sm">{{ tag }}</span>
          }
        </div>

        <div class="mt-auto pt-6 flex flex-wrap gap-3">
          @if (project.codeUrl) {
          <a [href]="project.codeUrl" target="_blank" rel="noopener" class="inline-flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold
                       border border-white/20 bg-white/5 text-white
                       hover:bg-white/10 transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-github"
              viewBox="0 0 16 16">
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8" />
            </svg>
            Code
          </a>
          } @if (project.demoUrl) {
          <a [href]="project.demoUrl" target="_blank" rel="noopener" class="inline-flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold text-white
                       bg-gradient-to-r from-pink-500/80 to-amber-400/80
                       hover:from-pink-500 hover:to-amber-400 transition
                       shadow-[0_14px_40px_rgba(0,0,0,.25)]">
            Demo
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
              class="bi bi-arrow-up-right" viewBox="0 0 16 16">
              <path fill-rule="evenodd"
                d="M14 2.5a.5.5 0 0 0-.5-.5h-6a.5.5 0 0 0 0 1h4.793L2.146 13.146a.5.5 0 0 0 .708.708L13 3.707V8.5a.5.5 0 0 0 1 0z" />
            </svg>
          </a>
          }
        </div>
      </article>
      }
    </div>
  </div>
</section>
